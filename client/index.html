<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no, viewport-fit=cover" />
    <!-- Apple Smart App Banner — renders an unobtrusive top-of-page promo
         in Safari on iPhone. Shows "OPEN" if IKB is installed (launches
         the app via intent), "VIEW/GET" if not (deep-links to App Store).
         Capacitor iOS WebView already runs IKB inline so the banner
         doesn't show inside the native app — Safari-only feature. -->
    <meta name="apple-itunes-app" content="app-id=6759305506" />
    <link rel="preconnect" href="https://a.espncdn.com" crossorigin />
    <link rel="dns-prefetch" href="https://a.espncdn.com" />
    <title>I KNOW BALL</title>
    <meta name="description" content="Win leagues. Pick winners. Prove you know ball." />
    <meta property="og:title" content="I KNOW BALL" />
    <meta property="og:description" content="Win leagues. Pick winners. Prove you know ball." />
    <meta property="og:image" content="https://iknowball.club/og-image.png" />
    <meta property="og:image:width" content="1200" />
    <meta property="og:image:height" content="630" />
    <meta property="og:type" content="website" />
    <meta property="og:url" content="https://iknowball.club" />
    <meta name="twitter:card" content="summary_large_image" />
    <meta name="twitter:title" content="I KNOW BALL" />
    <meta name="twitter:description" content="Win leagues. Pick winners. Prove you know ball." />
    <meta name="twitter:image" content="https://iknowball.club/og-image.png" />
    <meta name="theme-color" content="#FF4D00" />
    <meta name="apple-mobile-web-app-capable" content="yes" />
    <meta name="mobile-web-app-capable" content="yes" />

    <link rel="apple-touch-icon" sizes="180x180" href="/apple-touch-icon.png" />
    <link rel="apple-touch-icon" sizes="167x167" href="/apple-touch-icon-167x167.png" />

  <body>
    <div id="root"></div>
    <!-- Orientation-change zoom-reset hack removed — no longer needed
         now that the viewport meta tag has user-scalable=no. HTML
         viewport zoom is disabled; native WKWebView scrollView zoom
         (configured in MainViewController.swift) handles pinch
         gestures bidirectionally and bounded to 1x-5x, so the
         can't-zoom-out-of-stuck-state bug goes away. -->

    <script type="module" src="/src/main.jsx"></script>
  </body>
